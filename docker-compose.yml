services:
  postgres:
    image: postgres:16-alpine
    container_name: ooh-market-postgres
    environment:
      POSTGRES_USER: ooh_app
      POSTGRES_PASSWORD: ooh_app_password
      POSTGRES_DB: ooh_market
    ports:
      - "5432:5432"
    volumes:
      - ooh_postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ooh_app -d ooh_market"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ooh_postgres_data:
